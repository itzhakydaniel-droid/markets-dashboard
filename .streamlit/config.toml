[server]
headless = true

[client]
# Hide tracebacks/source paths from public viewers — details stay in server logs
showErrorDetails = false
toolbarMode = "viewer"

[browser]
# No usage telemetry
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#0d141c"
secondaryBackgroundColor = "#101828"
textColor = "#fffffe"
primaryColor = "#f00069"
